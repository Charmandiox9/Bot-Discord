version: '3.8'

services:
  discord-bot:
    image: discord-bot:latest
    container_name: discord-bot
    restart: unless-stopped
    volumes:
      # Persistir el archivo de playlists
      - ./playlists.json:/app/playlists.json
      # Mapear cookies para yt-dlp
      - ./youtube-cookies.txt:/app/youtube-cookies.txt
    env_file:
      - .env
